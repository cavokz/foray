name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test
      - run: cargo build --release

  online-tests:
    runs-on: ubuntu-latest
    env:
      ES_TEST_URL: http://localhost:9292
      ES_TEST_USER: elastic
      ES_TEST_PASSWORD: changeme
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Start Elasticsearch
        run: make es-up
      - name: Initialize Elasticsearch
        run: |
          if ! make es-init ES_URL=$ES_TEST_URL ES_USER=$ES_TEST_USER ES_PASSWORD=$ES_TEST_PASSWORD; then
            make es-logs
            exit 1
          fi
      - name: Run online tests
        run: cargo test --test elasticsearch_store_test -- --include-ignored
      - name: Stop Elasticsearch
        if: always()
        run: make es-down

  cross-check:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> "$GITHUB_ENV"
      - run: cargo clippy --target ${{ matrix.target }} -- -D warnings
      - run: cargo build --release --target ${{ matrix.target }}
